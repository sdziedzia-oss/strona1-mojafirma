[build]
  command   = "npm install && npm run build"
  publish   = "_site"

[build.environment]
  NODE_VERSION = "18"

# Przekierowanie panelu CMS
[[redirects]]
  from   = "/admin"
  to     = "/admin/"
  status = 301

# Strona 404
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Nagłówki bezpieczeństwa
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Nagłówki cache dla statycznych zasobów
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
